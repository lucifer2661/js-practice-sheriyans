<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Lazy Loading Fix</title>

<style>
body {
    font-family: Arial;
    text-align: center;
}

.spacer {
    height: 800px;
}

.img {
    width: 300px;
    height: 200px;
    margin: 50px auto;
    display: block;
    opacity: 0;
    transition: opacity 0.5s ease-in;
}

.img.loaded {
    opacity: 1;
}
</style>

</head>
<body>

<h1>Scroll Down 👇</h1>

<div class="spacer"></div>

<img class="img"
     src="https://via.placeholder.com/300x200?text=Loading"
     data-src="https://picsum.photos/id/1015/300/200">

<img class="img"
     src="https://via.placeholder.com/300x200?text=Loading"
     data-src="https://picsum.photos/id/1016/300/200">

<img class="img"
     src="https://via.placeholder.com/300x200?text=Loading"
     data-src="https://picsum.photos/id/1018/300/200">

<div class="spacer"></div>

<script>
let imgs = document.querySelectorAll('.img');

const observer = new IntersectionObserver((entries, observer) => {
    entries.forEach(entry => {
        if (entry.isIntersecting) {
            const img = entry.target;

            console.log("Loading image..."); // DEBUG

            img.src = img.dataset.src;
            img.classList.add('loaded');

            observer.unobserve(img);
        }
    });
}, {
    threshold: 0.1
});

imgs.forEach(img => observer.observe(img));
</script>

</body>
</html>
